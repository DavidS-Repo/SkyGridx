# SkyGrid Nether block selection guide:
#
# This file defines the block distributions for different
# biomes in the Nether dimension of your SkyGrid world. The configuration is
# organized into two main sections:
#
# 1. biomes: Maps each biome (or group of biomes) to a specific distribution.
# 2. distributions: Defines the block materials and their percentages.
#
# Notes:
# - Each biome must be assigned a distribution.
# - Percentages set the relative chance of each block appearing.
# - The total percentage for each distribution does not need to sum to 100%.
#   The plugin scales the values when needed.
# - Simple entries still use MATERIAL: chance.
# - Expanded parent entries may use SkyGrid shorthand, where MATERIAL: chance has
#   indented face attachments below it. SkyGrid rewrites this internally before loading.
#   Expanded entries can also use valid YAML with a nested chance value.
#   Face keys: top/up, bottom/down, east, west, north, south.
#   Random face keys: rends chooses one random top/bottom face; rsides chooses one random side face.
#   Attachment pools always choose one material when used; include AIR to sometimes place nothing.
#   Example:
#     GRASS_BLOCK: 25
#       top:
#         SUGAR_CANE: 20
#       east:
#         WATER: 10
#       rends:
#         RED_MUSHROOM: 20
#         BROWN_MUSHROOM: 20
#       rsides:
#         MYCELIUM: 50
#         MUSHROOM_STEM: 14
# - Use valid Bukkit Material enum names.
#   Reference: https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Material.html
#
# Example use:
# - To assign the same distribution to multiple biomes, list the biomes separated by commas.
# - You can define multiple distributions and assign them to different biomes as needed.
#
# Supported biomes:
# - See the Bukkit Biome documentation: https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/block/Biome.html for a list of supported biomes.

biomes:
  # Single-biome entry with its own custom distribution. To assign multiple biomes to the same distribution use comma separation like "SAMPLE_BIOME, OTHER_BIOME".
  SOUL_SAND_VALLEY:
    distribution: custom_soul_sand_valley

distributions:
  # Distribution for SOUL_SAND_VALLEY
  custom_soul_sand_valley:
    # Expanded shorthand: BlockID: Percentage with indented face attachment sections below it.
    ANCIENT_DEBRIS: 0.1
    BASALT: 20
    BLACKSTONE: 60
    BONE_BLOCK: 5
    CHEST: 10
    DRIED_GHAST: 2
    CRYING_OBSIDIAN: 2
    GILDED_BLACKSTONE: 4
    GLOWSTONE: 3
    GRAVEL: 30
    LAVA: 50
    MAGMA_BLOCK: 50
    NETHER_BRICKS: 30
    NETHER_GOLD_ORE: 6
    NETHER_QUARTZ_ORE: 15
    NETHER_SPROUTS: 7
    NETHER_WART: 30
    NETHERRACK: 60
    OBSIDIAN: 5
    OCHRE_FROGLIGHT: 4
    PEARLESCENT_FROGLIGHT: 4
    POLISHED_BLACKSTONE: 6
    POLISHED_BLACKSTONE_BRICKS: 4
    SHROOMLIGHT: 5
    SOUL_FIRE: 5
    SOUL_SAND: 150
    SOUL_SOIL: 600
    SPAWNER: 0.01
    TWISTING_VINES: 5
    VERDANT_FROGLIGHT: 4

  # Additional distributions can be defined here.
  # Example:
  # alternate_distribution:
  #   STONE: 40
  #   DIRT: 40
  #   SAND: 20

# Optional default distribution for biomes not explicitly defined in the 'biomes' section.
# This ensures that a fallback distribution is available.
default_distribution:
  ANCIENT_DEBRIS: 0.1
  BASALT: 20
  BLACKSTONE: 60
