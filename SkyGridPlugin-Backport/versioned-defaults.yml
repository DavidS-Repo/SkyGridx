# SkyGrid version-aware fresh-install catalog
#
# The files bundled beside this one are the Minecraft 1.21.0 baseline. On a
# genuinely fresh install, SkyGrid detects the running Minecraft version and
# cumulatively applies each matching "defaults" section below.
#
# "catalog" records API names introduced or removed in that release. Some
# catalog entries are intentionally not placed into defaults: boats, projectile
# entity types, mannequins, and technical test blocks are not valid mob-spawner
# or SkyGrid-generation choices.
#
# Existing installations are never merged or rewritten from this file.

